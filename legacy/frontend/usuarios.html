<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Sinka</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/gestao.css">
</head>
<body>
  <div id="topbar-container"></div>

  <main class="container">
    <section class="card">
      <h2>Criar novo usuário</h2>
      <form id="form-novo-usuario">
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" required>
        </div>
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required>
        </div>
        <div class="campo">
          <label for="senha">Senha provisória</label>
          <input type="password" id="senha" minlength="6" required>
          <small>A pessoa pode usar essa senha para o primeiro acesso</small>
        </div>
        <div class="campo">
          <label for="papel">Tipo de conta</label>
          <select id="papel">
            <option value="solicitante">Solicitante</option>
            <option value="atendente">Atendente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="campo campo-area" id="campo-area">
          <label for="area">Área de atuação</label>
          <select id="area"></select>
        </div>
        <p id="erro-novo" class="erro-msg"></p>
        <button type="submit">Criar usuário</button>
      </form>
    </section>

    <section class="card">
      <div class="lista-header">
        <h2>Usuários existentes</h2>
        <button id="btn-atualizar" class="btn-secundario">Atualizar</button>
      </div>
      <div id="lista-usuarios" class="lista-gestao">
        <p class="vazio">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/topbar.js"></script>
  <script src="js/areas.js"></script>
  <script>
    Auth.exigirLogin();
    const usuarioLogado = Auth.getUsuario();
    if (!usuarioLogado || usuarioLogado.papel !== 'admin') {
      window.location.href = 'index.html';
    }
    renderizarTopbar('usuarios');

    const USUARIOS_URL = `${API_BASE}/usuarios`;
    const listaEl = document.getElementById('lista-usuarios');
    const btnAtualizar = document.getElementById('btn-atualizar');

    const NOMES_PAPEL = { admin: 'Administrador', atendente: 'Atendente', solicitante: 'Solicitante' };

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Formulário de criação ---
    const formNovoEl = document.getElementById('form-novo-usuario');
    const papelNovoEl = document.getElementById('papel');
    const campoAreaNovoEl = document.getElementById('campo-area');
    const areaNovoEl = document.getElementById('area');
    const erroNovoEl = document.getElementById('erro-novo');

    areaNovoEl.innerHTML = AREAS.map(a => `<option value="${a}">${a}</option>`).join('');

    papelNovoEl.addEventListener('change', () => {
      campoAreaNovoEl.classList.toggle('visivel', papelNovoEl.value === 'atendente');
    });

    formNovoEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      erroNovoEl.textContent = '';

      const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
        papel: papelNovoEl.value,
        area: papelNovoEl.value === 'atendente' ? areaNovoEl.value : undefined
      };

      try {
        const res = await Auth.fetchAutenticado(USUARIOS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
        const resposta = await res.json();

        if (!res.ok) {
          erroNovoEl.textContent = resposta.erro || 'Erro ao criar usuário';
          return;
        }

        formNovoEl.reset();
        campoAreaNovoEl.classList.remove('visivel');
        carregarUsuarios();
      } catch (err) {
        erroNovoEl.textContent = 'Erro ao conectar ao servidor.';
      }
    });

    // --- Lista de usuários existentes ---
    async function carregarUsuarios() {
      listaEl.innerHTML = '<p class="vazio">Carregando...</p>';
      try {
        const res = await Auth.fetchAutenticado(USUARIOS_URL);
        const usuarios = await res.json();
        renderizarUsuarios(usuarios);
      } catch (err) {
        listaEl.innerHTML = '<p class="vazio">Erro ao carregar usuários.</p>';
      }
    }

    function renderizarUsuarios(usuarios) {
      listaEl.innerHTML = usuarios.map(u => `
        <div class="item-gestao">
          <h3>${escapeHtml(u.nome)} ${u.id === usuarioLogado.id ? '(você)' : ''}</h3>
          <p class="meta">${escapeHtml(u.email)} · Cadastrado em ${u.criado_em}</p>

          <form class="form-triagem" onsubmit="salvarUsuario(event, ${u.id})">
            <div class="campo">
              <label>Tipo de conta</label>
              <select name="papel" onchange="alternarAreaEdicao(this)">
                <option value="solicitante" ${u.papel === 'solicitante' ? 'selected' : ''}>Solicitante</option>
                <option value="atendente" ${u.papel === 'atendente' ? 'selected' : ''}>Atendente</option>
                <option value="admin" ${u.papel === 'admin' ? 'selected' : ''}>Administrador</option>
              </select>
            </div>
            <div class="campo campo-area ${u.papel === 'atendente' ? 'visivel' : ''}">
              <label>Área</label>
              <select name="area">
                ${AREAS.map(a => `<option value="${a}" ${u.area === a ? 'selected' : ''}>${a}</option>`).join('')}
              </select>
            </div>
            <button type="submit">Salvar</button>
          </form>
        </div>
      `).join('');
    }

    function alternarAreaEdicao(select) {
      const campoArea = select.closest('form').querySelector('.campo-area');
      campoArea.classList.toggle('visivel', select.value === 'atendente');
    }

    async function salvarUsuario(e, id) {
      e.preventDefault();
      const form = e.target;
      const papel = form.papel.value;
      const area = form.area.value;

      try {
        const res = await Auth.fetchAutenticado(`${USUARIOS_URL}/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ papel, area: papel === 'atendente' ? area : undefined })
        });

        const resposta = await res.json();

        if (!res.ok) {
          alert(resposta.erro || 'Erro ao atualizar usuário');
          return;
        }

        carregarUsuarios();
      } catch (err) {
        alert('Erro ao atualizar usuário.');
      }
    }

    btnAtualizar.addEventListener('click', carregarUsuarios);
    carregarUsuarios();
  </script>
</body>
</html>
