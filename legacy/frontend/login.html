<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Sinka</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-card-banner"><span class="ponto"></span> Portal de Chamados</div>
      <div class="auth-card-body">
        <h2>Entrar</h2>
      <p class="auth-subtitulo">Acesse sua conta para abrir ou acompanhar chamados</p>

      <form id="form-login">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required>
        </div>

        <p id="erro-login" class="erro-msg"></p>

        <button type="submit">Entrar</button>
      </form>

      <p class="auth-rodape">Não tem conta? <a href="registro.html">Cadastre-se</a></p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    if (Auth.estaLogado()) window.location.href = 'index.html';

    const form = document.getElementById('form-login');
    const erroEl = document.getElementById('erro-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      erroEl.textContent = '';

      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const dados = await res.json();

        if (!res.ok) {
          erroEl.textContent = dados.erro || 'Erro ao entrar';
          return;
        }

        Auth.salvarSessao(dados.token, dados.usuario);
        window.location.href = 'index.html';
      } catch (err) {
        erroEl.textContent = 'Não foi possível conectar ao servidor. Ele está rodando?';
      }
    });
  </script>
</body>
</html>
