<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triagem - Sinka</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/gestao.css">
</head>
<body>
  <div id="topbar-container"></div>

  <main class="container">
    <section class="card">
      <div class="lista-header">
        <h2>Triagem de chamados</h2>
        <button id="btn-atualizar" class="btn-secundario">Atualizar</button>
      </div>
      <p class="faq-intro">Defina a prioridade e a área responsável para encaminhar cada chamado.</p>
      <div id="lista-triagem" class="lista-gestao">
        <p class="vazio">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/topbar.js"></script>
  <script src="js/areas.js"></script>
  <script>
    Auth.exigirLogin();
    const usuario = Auth.getUsuario();
    if (!usuario || usuario.papel !== 'admin') {
      window.location.href = 'index.html';
    }
    renderizarTopbar('triagem');

    const listaEl = document.getElementById('lista-triagem');
    const btnAtualizar = document.getElementById('btn-atualizar');
    const TRIAGEM_URL = `${API_BASE}/chamados/triagem`;

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function carregar() {
      listaEl.innerHTML = '<p class="vazio">Carregando...</p>';
      try {
        const res = await Auth.fetchAutenticado(TRIAGEM_URL);
        const chamados = await res.json();
        renderizar(chamados);
      } catch (err) {
        listaEl.innerHTML = '<p class="vazio">Erro ao carregar a fila de triagem.</p>';
      }
    }

    function renderizar(chamados) {
      if (!chamados.length) {
        listaEl.innerHTML = '<p class="vazio">Nenhum chamado aguardando triagem. 🎉</p>';
        return;
      }

      listaEl.innerHTML = chamados.map(c => `
        <div class="item-gestao" data-id="${c.id}">
          <h3>${escapeHtml(c.titulo)}</h3>
          <p class="meta">Solicitante: ${escapeHtml(c.solicitante)} · ${c.criado_em}</p>
          <p class="descricao">${escapeHtml(c.descricao)}</p>
          <a class="link-ver" href="chamado.html?id=${c.id}">Ver detalhes</a>

          <form class="form-triagem" onsubmit="encaminhar(event, ${c.id})">
            <div class="campo">
              <label>Prioridade</label>
              <select name="prioridade" required>
                <option value="baixa">Baixa</option>
                <option value="media" selected>Média</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
              </select>
            </div>
            <div class="campo">
              <label>Área</label>
              <select name="area" required>
                ${AREAS.map(a => `<option value="${a}">${a}</option>`).join('')}
              </select>
            </div>
            <button type="submit">Encaminhar chamado</button>
          </form>
        </div>
      `).join('');
    }

    async function encaminhar(e, id) {
      e.preventDefault();
      const form = e.target;
      const prioridade = form.prioridade.value;
      const area = form.area.value;

      try {
        const res = await Auth.fetchAutenticado(`${API_BASE}/chamados/${id}/triagem`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prioridade, area })
        });

        if (!res.ok) {
          const erro = await res.json().catch(() => ({}));
          alert(erro.erro || 'Erro ao encaminhar chamado');
          return;
        }

        carregar();
      } catch (err) {
        alert('Erro ao encaminhar chamado.');
      }
    }

    btnAtualizar.addEventListener('click', carregar);
    carregar();
  </script>
</body>
</html>
